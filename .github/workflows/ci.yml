name: CI

# Chạy test + build cho cả frontend và backend mỗi khi push / mở PR.
# Hoàn toàn miễn phí với repo public (GitHub Actions).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lang-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lang-backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
      - run: npm run build

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lang-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lang-app/package-lock.json
      - run: npm ci
      - run: npm run test:unit
      - run: npm run build
