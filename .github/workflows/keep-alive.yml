name: Keep backend awake

# Giữ cho backend Render (gói free) không "ngủ" sau 15 phút không truy cập.
# Cứ ~10 phút lại gọi /health một lần. Miễn phí với repo public.

on:
  schedule:
    - cron: '*/10 * * * *'   # mỗi 10 phút (giờ UTC)
  workflow_dispatch:          # cho phép bấm chạy thủ công để test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging backend..."
          curl -fsS --max-time 60 https://lang-fskh.onrender.com/api/v1/health || echo "Ping failed (backend đang khởi động hoặc tạm lỗi) — bỏ qua."
